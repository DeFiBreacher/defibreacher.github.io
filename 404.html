<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — DeFiBreacher</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Share+Tech+Mono&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: #050f05;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }
    #wrap {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    #hex-bg { position: absolute; inset: 0; }
    #content {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; gap: 20px;
      padding: 2rem; text-align: center;
      max-width: 560px; width: 90vw;
    }
    #err-code {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(80px, 18vw, 130px);
      font-weight: 800; line-height: 1; letter-spacing: -4px;
      color: transparent; -webkit-text-stroke: 1px #46cadb22;
      position: relative; user-select: none;
    }
    #err-code-fill {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(80px, 18vw, 130px);
      font-weight: 800; line-height: 1; letter-spacing: -4px;
      color: #46cadb; clip-path: inset(0 100% 0 0);
    }
    #err-label {
      font-size: 11px; letter-spacing: 5px;
      color: #46cadb55; text-transform: uppercase;
    }
    #scan-wrap {
      width: 100%; height: 2px; background: #ffffff06;
      position: relative; overflow: hidden; border-radius: 2px;
    }
    #scan-line {
      height: 100%; width: 0%;
      background: #46cadb; box-shadow: 0 0 8px #46cadb;
      border-radius: 2px;
    }
    #terminal {
      background: #040d04; border: 1px solid #46cadb1a;
      border-radius: 6px; padding: 16px 20px;
      width: 100%; text-align: left;
    }
    #terminal-header { display: flex; gap: 6px; margin-bottom: 12px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .d1 { background: #ff5f5744; }
    .d2 { background: #febc2e44; }
    .d3 { background: #28c84044; }
    #terminal-lines { font-size: 11px; line-height: 2; color: #00ff4177; }
    #terminal-lines .cmd  { color: #46cadb; }
    #terminal-lines .err  { color: #ff444488; }
    #terminal-lines .ok   { color: #00ff4177; }
    .cursor {
      display: inline-block; width: 8px; height: 13px;
      background: #46cadb99; vertical-align: -2px;
      animation: blink .8s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
    #home-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; letter-spacing: 3px; color: #46cadb;
      border: 1px solid #46cadb33; background: none;
      padding: 10px 28px; border-radius: 4px; cursor: pointer;
      transition: all .2s; text-decoration: none; display: inline-block;
    }
    #home-btn:hover {
      color: #59f8d8; border-color: #59f8d866; background: #59f8d808;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="hex-bg"></canvas>
    <div id="content">
      <div style="position:relative;display:inline-block;">
        <div id="err-code">404</div>
        <div id="err-code-fill">404</div>
      </div>
      <div id="err-label">// access denied — page not found</div>
      <div id="scan-wrap"><div id="scan-line"></div></div>
      <div id="terminal">
        <div id="terminal-header">
          <div class="dot d1"></div>
          <div class="dot d2"></div>
          <div class="dot d3"></div>
        </div>
        <div id="terminal-lines">
          <div id="tl1"></div>
          <div id="tl2"></div>
          <div id="tl3"></div>
          <div id="tl4"></div>
          <div id="tl5" style="margin-top:4px;"><span class="cursor"></span></div>
        </div>
      </div>
      <a id="home-btn" href="/">[ return_to_base ]</a>
    </div>
  </div>

  <script>
    const lines = [
      { el:'tl1', cls:'cmd', text:'$ breach --target /this-page',          delay:300  },
      { el:'tl2', cls:'err', text:'✗ ERROR 404: target not found on chain', delay:1000 },
      { el:'tl3', cls:'ok',  text:'→ scanning contract registry...',        delay:1600 },
      { el:'tl4', cls:'err', text:'✗ no contract deployed at this address', delay:2300 },
    ];

    function typeLine(elId, cls, text, delay) {
      setTimeout(() => {
        const el = document.getElementById(elId);
        el.className = cls;
        let i = 0;
        const id = setInterval(() => {
          el.textContent = text.slice(0, ++i);
          if (i >= text.length) clearInterval(id);
        }, 22);
      }, delay);
    }
    lines.forEach(l => typeLine(l.el, l.cls, l.text, l.delay));

    const scanLine = document.getElementById('scan-line');
    const fill404  = document.getElementById('err-code-fill');
    let prog = 0;
    setTimeout(() => {
      const iv = setInterval(() => {
        prog = Math.min(prog + 1.2, 100);
        scanLine.style.width = prog + '%';
        fill404.style.clipPath = `inset(0 ${100 - prog}% 0 0)`;
        if (prog >= 100) clearInterval(iv);
      }, 20);
    }, 300);

    const cv   = document.getElementById('hex-bg');
    const ctx  = cv.getContext('2d');
    const wrap = document.getElementById('wrap');

    const HEX_R = 28;
    const HEX_W = Math.sqrt(3) * HEX_R;
    const ROW_H = HEX_R * 2 * 0.75;
    const COL_W = HEX_W;

    let pulses = [], frameCount = 0;

    function sizeCanvas() {
      cv.width  = wrap.offsetWidth;
      cv.height = wrap.offsetHeight;
    }
    sizeCanvas();
    window.addEventListener('resize', sizeCanvas);

    function hexPath(cx, cy, r) {
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = Math.PI / 180 * (60 * i - 30);
        const x = cx + r * Math.cos(a);
        const y = cy + r * Math.sin(a);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.closePath();
    }

    function getCenters() {
      const centers = [];
      const cols = Math.ceil(cv.width  / COL_W) + 2;
      const rows = Math.ceil(cv.height / ROW_H) + 2;
      for (let r = -1; r < rows; r++) {
        for (let c = -1; c < cols; c++) {
          const cx = c * COL_W + (r % 2 === 0 ? 0 : COL_W / 2);
          const cy = r * ROW_H;
          centers.push({ cx, cy });
        }
      }
      return centers;
    }

    function draw() {
      ctx.clearRect(0, 0, cv.width, cv.height);
      frameCount++;

      if (frameCount % 90 === 0 && pulses.length < 5) {
        const centers = getCenters();
        const c = centers[Math.floor(Math.random() * centers.length)];
        pulses.push({ cx: c.cx, cy: c.cy, r: 0, maxR: cv.width * 0.6, alpha: 0.5 });
      }

      getCenters().forEach(({ cx, cy }) => {
        let glow = 0;
        pulses.forEach(p => {
          const dist = Math.hypot(cx - p.cx, cy - p.cy);
          const diff = Math.abs(dist - p.r);
          if (diff < HEX_W * 1.5)
            glow = Math.max(glow, (1 - diff / (HEX_W * 1.5)) * p.alpha);
        });

        hexPath(cx, cy, HEX_R - 1);
        ctx.strokeStyle = `rgba(70,202,219,${0.03 + glow * 0.12})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();

        if (glow > 0.1) {
          ctx.fillStyle = `rgba(70,202,219,${glow * 0.04})`;
          ctx.fill();
        }
      });

      pulses = pulses
        .map(p => ({ ...p, r: p.r + 2.5, alpha: p.alpha * 0.992 }))
        .filter(p => p.alpha > 0.01 && p.r < p.maxR);

      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
